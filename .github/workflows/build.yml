          # functional-test .py is read ONLY from this clone — never bundled.
          MATIKA_REPO="${{ steps.recipe_info.outputs.matika_repo }}"
          echo "Fetching matika @ ${MATIKA_SHA} from ${MATIKA_REPO}"
          git init build/matika
          git -C build/matika remote add origin "${MATIKA_REPO}"
          git -C build/matika fetch --depth 1 origin "${MATIKA_SHA}"
          git -C build/matika checkout FETCH_HEAD

      - name: Checkout applugs at the build job's resolved SHAs (provenance-pinned)
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APPLUG_SHAS: ${{ needs.build-windows.outputs.applug_shas }}
        run: |
          # The applug repo URL + name still come from the recipe; the COMMIT
          # comes from the build job's emitted applug_shas JSON, keyed by applug
          # name — so the side-clone is byte-identical to what was frozen.
          python3 - <<'PYEOF'
          import json, os, shutil, subprocess
          path = os.environ["RECIPE_PATH"]
          shas = json.loads(os.environ["APPLUG_SHAS"])
          with open(path) as f:
              r = json.load(f)
          for plug in r["applugs"]:
              repo = plug["repo"]
              if not repo.startswith("http"):
                  repo = "https://" + repo
              name = plug["name"]
              sha  = shas[name]
              dest = f"build/matika/plugins/{name}"
              print(f"Fetching {name} @ {sha} from {repo} -> {dest}")
              subprocess.run(["git", "init", dest], check=True)
              subprocess.run(["git", "-C", dest, "remote", "add", "origin", repo], check=True)
              subprocess.run(["git", "-C", dest, "fetch", "--depth", "1", "origin", sha], check=True)
              subprocess.run(["git", "-C", dest, "checkout", "FETCH_HEAD"], check=True)
              dropped = []
              for entry in ['.git', '.github', '.husky', '.gitattributes', '.gitignore', 'node_modules', 'tests']:
                  path = os.path.join(dest, entry)
                  if os.path.isdir(path):
                      shutil.rmtree(path, onerror=lambda f, p, e: (os.chmod(p, 0o777), f(p)))
                      dropped.append(entry)
                  elif os.path.isfile(path):
                      os.remove(path)
                      dropped.append(entry)
              print(f"INFO: exported {name} @ {sha} -> {dest} (filtered: {' '.join(dropped) if dropped else 'none'})")
          PYEOF

      - name: Download installer EXE artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-windows-x86_64.exe

      - name: Silent-install EXE and verify installed application
        shell: cmd
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
          PRODUCT_SLUG: ${{ steps.recipe_info.outputs.product_slug }}
        run: |
          @echo off
          REM The Inno Setup installer places the app under %ProgramFiles%\<AppName>
          REM (DefaultDirName={autopf}\{#MyAppName} in windows_installer.iss).
          REM /SILENT suppresses the UI but respects the default install dir;
          REM /NORESTART prevents any automated reboot on the runner.
          set "INSTALLER=%PRODUCT_SLUG%-%PRODUCT_VERSION%-windows-x86_64.exe"
          echo Installing: %INSTALLER%
          "%INSTALLER%" /SILENT /NORESTART
          if errorlevel 1 (
            echo ::error::Inno Setup silent install exited with error
            exit /b 1
          )
          REM The installed EXE path follows Inno Setup's convention:
          REM   %ProgramFiles%\<AppName>\<AppName>-<Version>.exe
          REM (matching DefaultDirName and MyAppExeName in windows_installer.iss)
          set "INSTALL_DIR=%ProgramFiles%\%PRODUCT_NAME%"
          set "EXE=%INSTALL_DIR%\%PRODUCT_NAME%-%PRODUCT_VERSION%.exe"
          echo Installed exe: %EXE%
          if not exist "%EXE%" (
            echo ::error::installed exe not found at %EXE%
            dir "%INSTALL_DIR%" 2>nul || echo Install dir does not exist
            exit /b 1
          )
          REM Smoke-launch the installed application.
          python scripts/smoke_launch.py --exe "%EXE%" --expect-plugin eyerate --timeout 90
          if errorlevel 1 exit /b 1
          REM Feature-level checks on both install paths against the INSTALLED exe.
          REM The --exe flag is the "equivalent" installed-path override (ahimsa#81 §5).
          REM Option-3 source-root fork (L3 gate integration): --source-root points
          REM the harness at the side-cloned PINNED sources (build\matika core +
          REM plugins\*) so the manifest-driven L2 (tier-a/b) checks AND the L3
          REM applug-functional-test phase run against the INSTALLED %EXE%, with
          REM discovery from the pinned clone (tag-pinned, matching the build job).
          REM --functional explicitly enables the Layer-3 reboot-per-applug phase.
          REM The installed-disk manifest arm (A2, manomatika/ahimsa#83) and the
          REM route-vs-manifest gate (A3, #84) remain distinct follow-on items.
          python scripts/frozen_verify.py --exe "%EXE%" --source-root build/matika --functional --scenario fresh   --browser --timeout 120
          if errorlevel 1 exit /b 1
          python scripts/frozen_verify.py --exe "%EXE%" --source-root build/matika --functional --scenario upgrade --browser --timeout 120
          if errorlevel 1 exit /b 1

  # ---------------------------------------------------------------------------
  # REFRESH RELEASES.MD — workflow_dispatch only
  # Checks out manomatika/manomatika, renders RELEASES.md from its
  # release-log.yaml, and opens a PR to mm (not to ahimsa).
  # ---------------------------------------------------------------------------
  refresh-releases-md:
    # Skip when manomatika_ref is set — that indicates a cross-repo validation
    # build (not a production dispatch), where RELEASES.md on main should not
    # be auto-refreshed. Production dispatches leave manomatika_ref empty.
    if: github.event_name == 'workflow_dispatch' && !inputs.manomatika_ref
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout ahimsa (render script + package)
        uses: actions/checkout@v6

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout manomatika/manomatika (release-log.yaml + RELEASES.md)
        uses: actions/checkout@v6
        with:
          repository: manomatika/manomatika
          path: mm
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install uv
        run: pip install uv

      - name: Install ahimsa via uv
        run: uv sync --frozen

      - name: Render RELEASES.md
        env:
          RELEASE_LOG_PATH: mm/release-log.yaml
          RELEASES_MD_PATH: mm/RELEASES.md
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run python scripts/render_releases_md.py

      - name: Open PR to manomatika/manomatika with updated RELEASES.md
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh auth setup-git
          cd mm
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASES.md
          if git diff --quiet --cached; then
            echo "RELEASES.md is already up to date — skipping branch, push, and PR."
            exit 0
          fi
          BRANCH="auto/refresh-releases-md-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: refresh RELEASES.md from release-log.yaml"
          git push origin "$BRANCH"
          gh pr create \
            --repo manomatika/manomatika \
            --title "chore: refresh RELEASES.md" \
            --body "Auto-generated by ahimsa workflow_dispatch refresh. Review and merge to update the central release log." \
            --base main \
            --head "$BRANCH"
