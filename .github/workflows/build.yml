      - name: Build frontend (npm)
        shell: bash
        working-directory: build/matika
        run: |
          npm install
          npm run build

      - name: Run PyInstaller (freeze Matika.exe)
        shell: bash
        working-directory: build/matika
        run: |
          # matika.spec reads its own VERSION file and emits the
          # dist/Matika-<version>/ COLLECT tree containing Matika-<version>.exe.
          # Plugins cloned into plugins/ are bundled by launcher.py at first
          # run, not by the spec. Run from the cloned matika root so the spec's
