                  check=True,
              )
          PYEOF

      - name: Build frontend (npm)
        shell: bash
        working-directory: build/matika
        run: |
          npm install
          npm run build

      - name: Run PyInstaller (freeze Matika.app)
        shell: bash
        working-directory: build/matika
        run: |
          # matika.spec reads its own VERSION file and emits
          # dist/Matika-<version>.app plus the dist/Matika-<version>/ COLLECT
          # tree. Plugins cloned into plugins/ are bundled by launcher.py at
          # first run, not by the spec. Run from the cloned matika root so the
          # spec's SPEC-relative paths (src/, launcher.py, VERSION) resolve.
          pyinstaller matika.spec --noconfirm
          echo "PyInstaller output:"
          ls -la dist

      - name: TODO — run dmgbuild
        shell: bash
        run: |
          echo "TODO: dmgbuild not yet implemented (PR 2 / Wave 3) — will wrap"
          echo "build/matika/dist/Matika-<version>.app into a signed DMG here."
          # Placeholder artifact so the upload step does not fail during the
          # stub phase. Replaced by the real DMG when dmgbuild lands.
          touch "${{ steps.recipe_info.outputs.app_slug }}-${{ steps.recipe_info.outputs.app_version }}-macos-x86_64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.recipe_info.outputs.app_slug }}-${{ steps.recipe_info.outputs.app_version }}-macos-x86_64.dmg
          path: ${{ steps.recipe_info.outputs.app_slug }}-${{ steps.recipe_info.outputs.app_version }}-macos-x86_64.dmg

  # ---------------------------------------------------------------------------
  # BUILD — Windows x86_64
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    needs: validate
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install build dependencies
        run: pip install pyinstaller requests

      - name: Read recipe metadata
        id: recipe_info
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          path = os.environ["RECIPE_PATH"]
