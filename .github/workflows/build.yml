              name = plug["name"]
              dest = f"build/matika/plugins/{name}"
              print(f"Cloning {name} @ {tag} from {repo} -> {dest}")
              subprocess.run(
                  ["git", "clone", "--depth", "1", "--branch", tag, repo, dest],
                  check=True,
              )
          PYEOF

      - name: Build frontend (npm)
        shell: bash
        working-directory: build/matika
        run: |
          npm install
          npm run build

      - name: Run PyInstaller (freeze Matika.app)
        shell: bash
        working-directory: build/matika
        run: |
          # matika.spec reads its own VERSION file and emits
          # dist/Matika-<version>.app plus the dist/Matika-<version>/ COLLECT
          # tree. Plugins cloned into plugins/ are bundled by launcher.py at
          # first run, not by the spec. Run from the cloned matika root so the
          # spec's SPEC-relative paths (src/, launcher.py, VERSION) resolve.
          pyinstaller matika.spec --noconfirm
          echo "PyInstaller output:"
          ls -la dist

      - name: Build DMG (dmgbuild)
        shell: bash
        env:
          APP_SLUG: ${{ steps.recipe_info.outputs.app_slug }}
          APP_NAME: ${{ steps.recipe_info.outputs.app_name }}
          APP_VERSION: ${{ steps.recipe_info.outputs.app_version }}
          MATIKA_VERSION: ${{ steps.recipe_info.outputs.matika_version }}
          DMG_ARCH: x86_64
        run: |
          # Wrap the PyInstaller .app bundle in a DMG via the dmgbuild library.
          # The .app is named Matika-<matika_version>.app by matika.spec; the
          # DMG filename follows ahimsa's convention <slug>-<app_version>-macos-<arch>.dmg.
          APP_BUNDLE="build/matika/dist/Matika-${MATIKA_VERSION}.app"
