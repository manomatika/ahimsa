name: Build

on:
  workflow_dispatch:
    inputs:
      recipe_path:
        description: "Path to recipe.json (e.g. recipes/reference-app/recipe.json)"
        required: false
        default: "recipes/reference-app/recipe.json"
      manomatika_ref:
        description: "Branch/tag/SHA in manomatika/manomatika to fetch the recipe from (default: repo default branch). Use for cross-repo validation of recipe changes before merging."
        required: false
        default: ""

# ---------------------------------------------------------------------------
# VALIDATE
# ---------------------------------------------------------------------------
jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Fetch recipe from manomatika/manomatika
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p "$(dirname "$RECIPE_PATH")"
          MANOMATIKA_REF="${{ inputs.manomatika_ref }}"
          REF_QUERY="${MANOMATIKA_REF:+?ref=${MANOMATIKA_REF}}"
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/manomatika/manomatika/contents/${RECIPE_PATH}${REF_QUERY}" > "$RECIPE_PATH"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install ahimsa via uv
        run: uv sync --frozen

      - name: Validate recipe (fail fast)
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # MANOMATIKA_REF redirects the RELEASES.md / release-log.yaml fetch
          # inside ahimsa-validate to the same branch used for the recipe fetch.
          # Only set when manomatika_ref is non-empty (cross-repo validation).
          MANOMATIKA_REF: ${{ inputs.manomatika_ref }}
        run: uv run ahimsa-validate "$RECIPE_PATH"

  # ---------------------------------------------------------------------------
  # BUILD — macOS Apple Silicon (macos-14)
  # ---------------------------------------------------------------------------
  build-macos-arm:
    runs-on: macos-14
    needs: validate
    # SHA-PROVENANCE: emit the EXACT commits this job froze so the matching
    # install-verify job rebuilds its discovery side-clone byte-identically
    # (mutable tags must not be re-resolved on the verify side).
    outputs:
      matika_sha: ${{ steps.shas.outputs.matika_sha }}
      applug_shas: ${{ steps.shas.outputs.applug_shas }}
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Fetch recipe from manomatika/manomatika
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p "$(dirname "$RECIPE_PATH")"
          MANOMATIKA_REF="${{ inputs.manomatika_ref }}"
          REF_QUERY="${MANOMATIKA_REF:+?ref=${MANOMATIKA_REF}}"
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/manomatika/manomatika/contents/${RECIPE_PATH}${REF_QUERY}" > "$RECIPE_PATH"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install build dependencies
        run: pip install pyinstaller dmgbuild requests

      - name: Read recipe metadata
        id: recipe_info
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          app = r["application"]
          # PRODUCT identity drives every user-facing artifact/bundle name. The
          # filename slug is the product name lower-cased + slugified (lowercase
          # artifact-filename convention); the proper-noun product_name is used
          # verbatim for the installed .app / .exe identity. The PRODUCT version
          # (application.version) — NOT matika's framework version — is embedded
          # in artifact names and the installed identity.
          product_name = app["product_name"]
          product_slug = re.sub(r"[^a-z0-9]+", "-", product_name.lower()).strip("-")
          product_ver  = app["version"]
          matika_repo  = r["matika"]["repo"]
          # The recipe pins matika by explicit tag (recipe.matika.tag), the
          # same way each applug is pinned by its own tag. Use it directly
          # rather than deriving "v{version}" so the recipe stays the single
          # source of truth for what gets checked out.
          matika_tag   = r["matika"]["tag"]
          if not matika_repo.startswith("http"):
              matika_repo = "https://" + matika_repo
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"product_name={product_name}\n")
              f.write(f"product_slug={product_slug}\n")
              f.write(f"product_version={product_ver}\n")
              f.write(f"matika_repo={matika_repo}\n")
              f.write(f"matika_tag={matika_tag}\n")
          print(f"Product  : {product_name} v{product_ver}")
          print(f"Slug     : {product_slug}")
          print(f"Matika   : {matika_tag}")
          print(f"Repo     : {matika_repo}")
          PYEOF

      - name: Configure git credentials for GitHub App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh auth setup-git

      - name: Clone Matika at declared version
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          MATIKA_REPO="${{ steps.recipe_info.outputs.matika_repo }}"
          MATIKA_TAG="${{ steps.recipe_info.outputs.matika_tag }}"
          echo "Cloning Matika $MATIKA_TAG from $MATIKA_REPO"
          git clone --depth 1 --branch "$MATIKA_TAG" "$MATIKA_REPO" build/matika

      - name: Clone AppLugs into build/matika/plugins/
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          for plug in r["applugs"]:
              repo = plug["repo"]
              if not repo.startswith("http"):
                  repo = "https://" + repo
              tag  = plug["tag"]
              name = plug["name"]
              dest = f"build/matika/plugins/{name}"
              print(f"Cloning {name} @ {tag} from {repo} -> {dest}")
              subprocess.run(
                  ["git", "clone", "--depth", "1", "--branch", tag, repo, dest],
                  check=True,
              )
          PYEOF

      - name: Resolve pinned commit SHAs (provenance for install-verify)
        id: shas
        shell: bash
        run: |
          # Tags are mutable; the install-verify side-clone must be rebuilt from
          # the EXACT commits frozen here, not by re-resolving the recipe tag.
          # Resolve matika's HEAD and every cloned applug's HEAD and emit them as
          # job outputs: matika_sha (string) + applug_shas (JSON object, generic
          # over the applug set, e.g. {"eyerate":"<sha>"}).
          MATIKA_SHA="$(git -C build/matika rev-parse HEAD)"
          echo "matika_sha=${MATIKA_SHA}" >> "$GITHUB_OUTPUT"
          python3 - <<'PYEOF' > applug_shas.json
          import json, os, subprocess
          shas = {}
          plugins_dir = os.path.join("build", "matika", "plugins")
          if os.path.isdir(plugins_dir):
              for name in sorted(os.listdir(plugins_dir)):
                  dest = os.path.join(plugins_dir, name)
                  if not os.path.isdir(dest):
                      continue
                  sha = subprocess.run(
                      ["git", "-C", dest, "rev-parse", "HEAD"],
                      check=True, capture_output=True, text=True,
                  ).stdout.strip()
                  shas[name] = sha
          print(json.dumps(shas))
          PYEOF
          APPLUG_SHAS="$(cat applug_shas.json)"
          echo "applug_shas=${APPLUG_SHAS}" >> "$GITHUB_OUTPUT"
          rm -f applug_shas.json
          echo "Resolved matika_sha=${MATIKA_SHA}"
          echo "Resolved applug_shas=${APPLUG_SHAS}"

      - name: Strip dev scaffolding from applug payloads
        shell: bash
        run: |
          echo "Stripping dev scaffolding from applug payloads (post-SHA-resolution)..."
          for plug_dir in build/matika/plugins/*/; do
            [ -d "$plug_dir" ] || continue
            name="$(basename "$plug_dir")"
            dropped=""
            for entry in .git .github .husky .gitattributes .gitignore node_modules tests; do
              target="${plug_dir}${entry}"
              if [ -e "$target" ] || [ -L "$target" ]; then
                rm -rf "$target"
                dropped="${dropped}${entry} "
              fi
            done
            if [ -n "$dropped" ]; then
              echo "INFO: stripped from ${name}: ${dropped}"
            else
              echo "INFO: ${name} had no scaffolding to strip"
            fi
          done
          # Verify: fail loud if any scaffolding leaked through
          leaked=""
          for plug_dir in build/matika/plugins/*/; do
            [ -d "$plug_dir" ] || continue
            name="$(basename "$plug_dir")"
            for entry in .git .github .husky .gitattributes .gitignore node_modules tests; do
              if [ -e "${plug_dir}${entry}" ]; then
                leaked="${leaked}${name}/${entry} "
              fi
            done
          done
          if [ -n "$leaked" ]; then
            echo "ERROR: scaffolding leaked into payload: ${leaked}"
            exit 1
          fi

      - name: Build frontend (npm)
        shell: bash
        working-directory: build/matika
        run: |
          npm install
          npm run build

      - name: Install Matika runtime dependencies (PyInstaller bundles only what is importable)
        shell: bash
        working-directory: build/matika
        run: |
          # ROOT CAUSE of the "No module named 'alembic'" boot failure: the
          # frozen app shipped NONE of matika's runtime deps because they were
          # never installed before PyInstaller froze the bundle. PyInstaller can
          # only collect packages importable in THIS environment, so alembic /
          # fastapi / uvicorn / sqlalchemy were silently omitted and the app
          # died at the first third-party import. Extract deps from pyproject.toml
          # and install them individually (NOT `pip install -e .`) to bypass the
          # requires-python>=3.14 gate — CI runs Python 3.11, but the individual
          # packages are all 3.11-compatible. tomllib is stdlib from Python 3.11+.
          python3 -c "import tomllib,subprocess,sys; d=tomllib.load(open('pyproject.toml','rb')); subprocess.run([sys.executable,'-m','pip','install']+d['project']['dependencies'],check=True)"

      - name: Install AppLug runtime dependencies
        shell: bash
        working-directory: build/matika
        run: |
          # Install each cloned AppLug's runtime requirements before PyInstaller
          # so data-provider deps (e.g. yfinance, curl_cffi for eyerate) are
          # importable and collected by collect_all() in matika.spec. Without
          # this step, eyerate's symbol lookup/search silently returns empty
          # in the frozen app because curl_cffi/yfinance are not bundled.
          # Prefer pyproject.toml; fall back to requirements.txt for older
          # pinned applug tags that pre-date pyproject.toml adoption.
          for plug_dir in plugins/*/; do
            if [ -f "${plug_dir}pyproject.toml" ]; then
              PLUG_PY="${plug_dir}pyproject.toml" python3 -c "import tomllib,subprocess,sys,os; d=tomllib.load(open(os.environ['PLUG_PY'],'rb')); deps=d.get('project',{}).get('dependencies',[]); subprocess.run([sys.executable,'-m','pip','install']+deps,check=True) if deps else None"
            elif [ -f "${plug_dir}requirements.txt" ]; then
              pip install -r "${plug_dir}requirements.txt"
            fi
          done

      - name: Run PyInstaller (freeze the product bundle)
        shell: bash
        working-directory: build/matika
        env:
          # Drive the frozen artifact's identity from the recipe's product
          # fields so the bundle is <product_name>-<product_version> (e.g.
          # ManoMatika-0.0.1), not the matika component name/version.
          # matika.spec defaults to "Matika" + its own VERSION only for
          # standalone dev builds where neither env var is set.
          MATIKA_PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          MATIKA_PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # CORE/SUFFIX + PRODUCT-IDENTITY CONTRACT (cross-repo with
          # manomatika/matika): matika.spec reads MATIKA_PRODUCT_NAME and
          # MATIKA_PRODUCT_VERSION (set above from the recipe's product fields),
          # strips any pre-release suffix (-dev / -rc.N) from the version to
          # BARE CORE, and emits dist/<product_name>-<core>.app plus the
          # dist/<product_name>-<core>/ COLLECT tree (e.g. ManoMatika-0.0.1).
          # So the bundle is named after the PRODUCT, not the matika component,
          # and the DMG/installer steps below locate it by the same product
          # name + product version even when the build runs at an rc TAG.
          # Plugins cloned into plugins/ are bundled by launcher.py at first run,
          # not by the spec. Run from the cloned matika root so the spec's
          # SPEC-relative paths (src/, launcher.py, VERSION) resolve.
          pyinstaller matika.spec --noconfirm
          echo "PyInstaller output:"
          ls -la dist

      - name: Assert PyInstaller bundle matches product identity
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # Regression guard: matika.spec must emit <product_name>-<product_version>
          # (from MATIKA_PRODUCT_NAME/VERSION), not Matika-<framework_version>.
          # Failure here means the cloned matika tag predates the product-identity
          # spec changes (v0.0.4-rc.3+). Fix: pin a newer matika.tag in the recipe.
          BUNDLE="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}"
          if [ ! -d "$BUNDLE" ]; then
            echo "::error::PyInstaller produced wrong bundle name."
            echo "Expected dir : $BUNDLE"
            echo "Found in build/matika/dist/:"
            ls -la build/matika/dist/ || true
            echo "Ensure recipe matika.tag >= v0.0.4-rc.3 (includes spec product-identity fix)."
            exit 1
          fi
          echo "OK: ${PRODUCT_NAME}-${PRODUCT_VERSION} dir exists"

      - name: Smoke-launch the frozen app (boot, migrate, load applug, serve)
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # DURABLE GUARDRAIL (the systemic gap that let three broken builds
          # reach the user): actually BOOT the frozen artifact and fail the
          # build if it can't start. Launches the .app's inner Mach-O binary
          # natively in a clean temp HOME so the real first-run path runs
          # (SECRET_KEY, in-process alembic migrate, applug discovery/load,
          # uvicorn bind). The script polls the server, asserts the migration
          # ran and the eyerate applug loaded, dumps ~/matika/logs on failure,
          # then terminates the app. A hung boot fails via the timeout.
          APP="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}.app"
          EXE="$APP/Contents/MacOS/${PRODUCT_NAME}-${PRODUCT_VERSION}"
          python scripts/smoke_launch.py --exe "$EXE" --expect-plugin eyerate --timeout 90

      - name: Install verification dependencies (requests + Playwright Chromium)
        shell: bash
        run: |
          python -m pip install --upgrade requests playwright
          python -m playwright install chromium

      - name: Verify product FEATURES — fresh + upgrade-over-stale (tier a HTTP + tier b browser)
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # Closes the systemic gap (standing rule 22): the boot smoke proved only
          # that the app STARTS. These checks prove EyeRate WORKS against the FROZEN
          # artifact — admin provider form present + "coming soon" absent, VOO lookup
          # returns real results, and a forced provider failure surfaces a VISIBLE
          # error (Task-4) — on BOTH install paths, including the upgrade-over-stale
          # path that shipped the "coming soon / lookup dead" regression. The upgrade
          # scenario boots once, mutates ~/matika/plugins/eyerate into the user's
          # exact stale state (old template, older version, no marker, + user data),
          # reboots, and asserts the launcher REFRESHED the code while PRESERVING the
          # user data. Tier (a) is authenticated HTTP; tier (b) drives a headless
          # Chromium through the lookup-dialog DOM.
          APP="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}.app"
          EXE="$APP/Contents/MacOS/${PRODUCT_NAME}-${PRODUCT_VERSION}"
          # --source-root build/matika points the harness at the PINNED SOURCE
          # CLONES (matika core + plugins/*) so the tier-a/tier-b checks are
          # MANIFEST-DRIVEN: they discover and drive every declared screen from
          # the assembled *_screens.json (manomatika/ahimsa#82, A1 source-clone
          # arm) rather than hardcoding routes/markers.
          # --functional explicitly enables the Layer-3 applug-functional-test
          # phase (reboot-per-applug); it is also implied by --source-root, but
          # we pass it explicitly so the gate's intent is unambiguous in the job.
          python scripts/frozen_verify.py --exe "$EXE" --source-root build/matika --functional --scenario fresh   --browser --timeout 120
          python scripts/frozen_verify.py --exe "$EXE" --source-root build/matika --functional --scenario upgrade --browser --timeout 120

      - name: Build DMG (dmgbuild)
        shell: bash
        env:
          PRODUCT_SLUG: ${{ steps.recipe_info.outputs.product_slug }}
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
          DMG_ARCH: arm64
        run: |
          # Wrap the PyInstaller .app bundle in a DMG via the dmgbuild library.
          # matika.spec emits <product_name>-<product-core>.app (suffix
          # stripped), driven by the MATIKA_PRODUCT_* env passed to the
          # PyInstaller step — so the installed bundle is named after the
          # PRODUCT (e.g. ManoMatika-0.0.1.app), not the matika component. The
          # DMG filename follows ahimsa's lowercase convention
          # <product_slug>-<product_version>-macos-<arch>.dmg.
          APP_BUNDLE="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}.app"
          DMG_NAME="${PRODUCT_SLUG}-${PRODUCT_VERSION}-macos-${DMG_ARCH}.dmg"
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "::error::Expected app bundle not found: $APP_BUNDLE"
            ls -la build/matika/dist || true
            exit 1
          fi
          python3 scripts/make_dmg.py \
            --app "$APP_BUNDLE" \
            --volname "${PRODUCT_NAME} ${PRODUCT_VERSION}" \
            --output "$DMG_NAME"
          echo "Built DMG:"
          ls -la "$DMG_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-macos-arm64.dmg
          path: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-macos-arm64.dmg

  # ---------------------------------------------------------------------------
  # BUILD — macOS Intel (macos-15-intel)
  # ---------------------------------------------------------------------------
  build-macos-intel:
    runs-on: macos-15-intel
    needs: validate
    # SHA-PROVENANCE: emit the EXACT commits this job froze so the matching
    # install-verify job rebuilds its discovery side-clone byte-identically
    # (mutable tags must not be re-resolved on the verify side).
    outputs:
      matika_sha: ${{ steps.shas.outputs.matika_sha }}
      applug_shas: ${{ steps.shas.outputs.applug_shas }}
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Fetch recipe from manomatika/manomatika
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p "$(dirname "$RECIPE_PATH")"
          MANOMATIKA_REF="${{ inputs.manomatika_ref }}"
          REF_QUERY="${MANOMATIKA_REF:+?ref=${MANOMATIKA_REF}}"
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/manomatika/manomatika/contents/${RECIPE_PATH}${REF_QUERY}" > "$RECIPE_PATH"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install build dependencies
        run: pip install pyinstaller dmgbuild requests

      - name: Read recipe metadata
        id: recipe_info
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          app = r["application"]
          # PRODUCT identity drives every user-facing artifact/bundle name. The
          # filename slug is the product name lower-cased + slugified (lowercase
          # artifact-filename convention); the proper-noun product_name is used
          # verbatim for the installed .app / .exe identity. The PRODUCT version
          # (application.version) — NOT matika's framework version — is embedded
          # in artifact names and the installed identity.
          product_name = app["product_name"]
          product_slug = re.sub(r"[^a-z0-9]+", "-", product_name.lower()).strip("-")
          product_ver  = app["version"]
          matika_repo  = r["matika"]["repo"]
          # The recipe pins matika by explicit tag (recipe.matika.tag), the
          # same way each applug is pinned by its own tag. Use it directly
          # rather than deriving "v{version}" so the recipe stays the single
          # source of truth for what gets checked out.
          matika_tag   = r["matika"]["tag"]
          if not matika_repo.startswith("http"):
              matika_repo = "https://" + matika_repo
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"product_name={product_name}\n")
              f.write(f"product_slug={product_slug}\n")
              f.write(f"product_version={product_ver}\n")
              f.write(f"matika_repo={matika_repo}\n")
              f.write(f"matika_tag={matika_tag}\n")
          print(f"Product  : {product_name} v{product_ver}")
          print(f"Slug     : {product_slug}")
          print(f"Matika   : {matika_tag}")
          print(f"Repo     : {matika_repo}")
          PYEOF

      - name: Configure git credentials for GitHub App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh auth setup-git

      - name: Clone Matika at declared version
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          MATIKA_REPO="${{ steps.recipe_info.outputs.matika_repo }}"
          MATIKA_TAG="${{ steps.recipe_info.outputs.matika_tag }}"
          echo "Cloning Matika $MATIKA_TAG from $MATIKA_REPO"
          git clone --depth 1 --branch "$MATIKA_TAG" "$MATIKA_REPO" build/matika

      - name: Clone AppLugs into build/matika/plugins/
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          for plug in r["applugs"]:
              repo = plug["repo"]
              if not repo.startswith("http"):
                  repo = "https://" + repo
              tag  = plug["tag"]
              name = plug["name"]
              dest = f"build/matika/plugins/{name}"
              print(f"Cloning {name} @ {tag} from {repo} -> {dest}")
              subprocess.run(
                  ["git", "clone", "--depth", "1", "--branch", tag, repo, dest],
                  check=True,
              )
          PYEOF

      - name: Resolve pinned commit SHAs (provenance for install-verify)
        id: shas
        shell: bash
        run: |
          # Tags are mutable; the install-verify side-clone must be rebuilt from
          # the EXACT commits frozen here, not by re-resolving the recipe tag.
          # Resolve matika's HEAD and every cloned applug's HEAD and emit them as
          # job outputs: matika_sha (string) + applug_shas (JSON object, generic
          # over the applug set, e.g. {"eyerate":"<sha>"}).
          MATIKA_SHA="$(git -C build/matika rev-parse HEAD)"
          echo "matika_sha=${MATIKA_SHA}" >> "$GITHUB_OUTPUT"
          python3 - <<'PYEOF' > applug_shas.json
          import json, os, subprocess
          shas = {}
          plugins_dir = os.path.join("build", "matika", "plugins")
          if os.path.isdir(plugins_dir):
              for name in sorted(os.listdir(plugins_dir)):
                  dest = os.path.join(plugins_dir, name)
                  if not os.path.isdir(dest):
                      continue
                  sha = subprocess.run(
                      ["git", "-C", dest, "rev-parse", "HEAD"],
                      check=True, capture_output=True, text=True,
                  ).stdout.strip()
                  shas[name] = sha
          print(json.dumps(shas))
          PYEOF
          APPLUG_SHAS="$(cat applug_shas.json)"
          echo "applug_shas=${APPLUG_SHAS}" >> "$GITHUB_OUTPUT"
          rm -f applug_shas.json
          echo "Resolved matika_sha=${MATIKA_SHA}"
          echo "Resolved applug_shas=${APPLUG_SHAS}"

      - name: Strip dev scaffolding from applug payloads
        shell: bash
        run: |
          echo "Stripping dev scaffolding from applug payloads (post-SHA-resolution)..."
          for plug_dir in build/matika/plugins/*/; do
            [ -d "$plug_dir" ] || continue
            name="$(basename "$plug_dir")"
            dropped=""
            for entry in .git .github .husky .gitattributes .gitignore node_modules tests; do
              target="${plug_dir}${entry}"
              if [ -e "$target" ] || [ -L "$target" ]; then
                rm -rf "$target"
                dropped="${dropped}${entry} "
              fi
            done
            if [ -n "$dropped" ]; then
              echo "INFO: stripped from ${name}: ${dropped}"
            else
              echo "INFO: ${name} had no scaffolding to strip"
            fi
          done
          # Verify: fail loud if any scaffolding leaked through
          leaked=""
          for plug_dir in build/matika/plugins/*/; do
            [ -d "$plug_dir" ] || continue
            name="$(basename "$plug_dir")"
            for entry in .git .github .husky .gitattributes .gitignore node_modules tests; do
              if [ -e "${plug_dir}${entry}" ]; then
                leaked="${leaked}${name}/${entry} "
              fi
            done
          done
          if [ -n "$leaked" ]; then
            echo "ERROR: scaffolding leaked into payload: ${leaked}"
            exit 1
          fi

      - name: Build frontend (npm)
        shell: bash
        working-directory: build/matika
        run: |
          npm install
          npm run build

      - name: Install Matika runtime dependencies (PyInstaller bundles only what is importable)
        shell: bash
        working-directory: build/matika
        run: |
          # ROOT CAUSE of the "No module named 'alembic'" boot failure: the
          # frozen app shipped NONE of matika's runtime deps because they were
          # never installed before PyInstaller froze the bundle. PyInstaller can
          # only collect packages importable in THIS environment, so alembic /
          # fastapi / uvicorn / sqlalchemy were silently omitted and the app
          # died at the first third-party import. Extract deps from pyproject.toml
          # and install them individually (NOT `pip install -e .`) to bypass the
          # requires-python>=3.14 gate — CI runs Python 3.11, but the individual
          # packages are all 3.11-compatible. tomllib is stdlib from Python 3.11+.
          python3 -c "import tomllib,subprocess,sys; d=tomllib.load(open('pyproject.toml','rb')); subprocess.run([sys.executable,'-m','pip','install']+d['project']['dependencies'],check=True)"

      - name: Install AppLug runtime dependencies
        shell: bash
        working-directory: build/matika
        run: |
          # Install each cloned AppLug's runtime requirements before PyInstaller
          # so data-provider deps (e.g. yfinance, curl_cffi for eyerate) are
          # importable and collected by collect_all() in matika.spec. Without
          # this step, eyerate's symbol lookup/search silently returns empty
          # in the frozen app because curl_cffi/yfinance are not bundled.
          # Prefer pyproject.toml; fall back to requirements.txt for older
          # pinned applug tags that pre-date pyproject.toml adoption.
          for plug_dir in plugins/*/; do
            if [ -f "${plug_dir}pyproject.toml" ]; then
              PLUG_PY="${plug_dir}pyproject.toml" python3 -c "import tomllib,subprocess,sys,os; d=tomllib.load(open(os.environ['PLUG_PY'],'rb')); deps=d.get('project',{}).get('dependencies',[]); subprocess.run([sys.executable,'-m','pip','install']+deps,check=True) if deps else None"
            elif [ -f "${plug_dir}requirements.txt" ]; then
              pip install -r "${plug_dir}requirements.txt"
            fi
          done

      - name: Run PyInstaller (freeze the product bundle)
        shell: bash
        working-directory: build/matika
        env:
          # Drive the frozen artifact's identity from the recipe's product
          # fields so the bundle is <product_name>-<product_version> (e.g.
          # ManoMatika-0.0.1), not the matika component name/version.
          # matika.spec defaults to "Matika" + its own VERSION only for
          # standalone dev builds where neither env var is set.
          MATIKA_PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          MATIKA_PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # CORE/SUFFIX + PRODUCT-IDENTITY CONTRACT (cross-repo with
          # manomatika/matika): matika.spec reads MATIKA_PRODUCT_NAME and
          # MATIKA_PRODUCT_VERSION (set above from the recipe's product fields),
          # strips any pre-release suffix (-dev / -rc.N) from the version to
          # BARE CORE, and emits dist/<product_name>-<core>.app plus the
          # dist/<product_name>-<core>/ COLLECT tree (e.g. ManoMatika-0.0.1).
          # So the bundle is named after the PRODUCT, not the matika component,
          # and the DMG/installer steps below locate it by the same product
          # name + product version even when the build runs at an rc TAG.
          # Plugins cloned into plugins/ are bundled by launcher.py at first run,
          # not by the spec. Run from the cloned matika root so the spec's
          # SPEC-relative paths (src/, launcher.py, VERSION) resolve.
          pyinstaller matika.spec --noconfirm
          echo "PyInstaller output:"
          ls -la dist

      - name: Assert PyInstaller bundle matches product identity
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          BUNDLE="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}"
          if [ ! -d "$BUNDLE" ]; then
            echo "::error::PyInstaller produced wrong bundle name."
            echo "Expected dir : $BUNDLE"
            echo "Found in build/matika/dist/:"
            ls -la build/matika/dist/ || true
            echo "Ensure recipe matika.tag >= v0.0.4-rc.3 (includes spec product-identity fix)."
            exit 1
          fi
          echo "OK: ${PRODUCT_NAME}-${PRODUCT_VERSION} dir exists"

      - name: Smoke-launch the frozen app (boot, migrate, load applug, serve)
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # DURABLE GUARDRAIL (the systemic gap that let three broken builds
          # reach the user): actually BOOT the frozen artifact and fail the
          # build if it can't start. Launches the .app's inner Mach-O binary
          # natively in a clean temp HOME so the real first-run path runs
          # (SECRET_KEY, in-process alembic migrate, applug discovery/load,
          # uvicorn bind). The script polls the server, asserts the migration
          # ran and the eyerate applug loaded, dumps ~/matika/logs on failure,
          # then terminates the app. A hung boot fails via the timeout.
          APP="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}.app"
          EXE="$APP/Contents/MacOS/${PRODUCT_NAME}-${PRODUCT_VERSION}"
          python scripts/smoke_launch.py --exe "$EXE" --expect-plugin eyerate --timeout 90

      - name: Install verification dependencies (requests + Playwright Chromium)
        shell: bash
        run: |
          python -m pip install --upgrade requests playwright
          python -m playwright install chromium

      - name: Verify product FEATURES — fresh + upgrade-over-stale (tier a HTTP + tier b browser)
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # Closes the systemic gap (standing rule 22): the boot smoke proved only
          # that the app STARTS. These checks prove EyeRate WORKS against the FROZEN
          # artifact — admin provider form present + "coming soon" absent, VOO lookup
          # returns real results, and a forced provider failure surfaces a VISIBLE
          # error (Task-4) — on BOTH install paths, including the upgrade-over-stale
          # path that shipped the "coming soon / lookup dead" regression. The upgrade
          # scenario boots once, mutates ~/matika/plugins/eyerate into the user's
          # exact stale state (old template, older version, no marker, + user data),
          # reboots, and asserts the launcher REFRESHED the code while PRESERVING the
          # user data. Tier (a) is authenticated HTTP; tier (b) drives a headless
          # Chromium through the lookup-dialog DOM.
          APP="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}.app"
          EXE="$APP/Contents/MacOS/${PRODUCT_NAME}-${PRODUCT_VERSION}"
          # --source-root build/matika points the harness at the PINNED SOURCE
          # CLONES (matika core + plugins/*) so the tier-a/tier-b checks are
          # MANIFEST-DRIVEN: they discover and drive every declared screen from
          # the assembled *_screens.json (manomatika/ahimsa#82, A1 source-clone
          # arm) rather than hardcoding routes/markers.
          # --functional explicitly enables the Layer-3 applug-functional-test
          # phase (reboot-per-applug); it is also implied by --source-root, but
          # we pass it explicitly so the gate's intent is unambiguous in the job.
          python scripts/frozen_verify.py --exe "$EXE" --source-root build/matika --functional --scenario fresh   --browser --timeout 120
          python scripts/frozen_verify.py --exe "$EXE" --source-root build/matika --functional --scenario upgrade --browser --timeout 120

      - name: Build DMG (dmgbuild)
        shell: bash
        env:
          PRODUCT_SLUG: ${{ steps.recipe_info.outputs.product_slug }}
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
          DMG_ARCH: x86_64
        run: |
          # Wrap the PyInstaller .app bundle in a DMG via the dmgbuild library.
          # matika.spec emits <product_name>-<product-core>.app (suffix
          # stripped), driven by the MATIKA_PRODUCT_* env passed to the
          # PyInstaller step — so the installed bundle is named after the
          # PRODUCT (e.g. ManoMatika-0.0.1.app), not the matika component. The
          # DMG filename follows ahimsa's lowercase convention
          # <product_slug>-<product_version>-macos-<arch>.dmg.
          APP_BUNDLE="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}.app"
          DMG_NAME="${PRODUCT_SLUG}-${PRODUCT_VERSION}-macos-${DMG_ARCH}.dmg"
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "::error::Expected app bundle not found: $APP_BUNDLE"
            ls -la build/matika/dist || true
            exit 1
          fi
          python3 scripts/make_dmg.py \
            --app "$APP_BUNDLE" \
            --volname "${PRODUCT_NAME} ${PRODUCT_VERSION}" \
            --output "$DMG_NAME"
          echo "Built DMG:"
          ls -la "$DMG_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-macos-x86_64.dmg
          path: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-macos-x86_64.dmg

  # ---------------------------------------------------------------------------
  # BUILD — Windows x86_64
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    needs: validate
    # SHA-PROVENANCE: emit the EXACT commits this job froze so the matching
    # install-verify job rebuilds its discovery side-clone byte-identically
    # (mutable tags must not be re-resolved on the verify side).
    outputs:
      matika_sha: ${{ steps.shas.outputs.matika_sha }}
      applug_shas: ${{ steps.shas.outputs.applug_shas }}
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Fetch recipe from manomatika/manomatika
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p "$(dirname "$RECIPE_PATH")"
          MANOMATIKA_REF="${{ inputs.manomatika_ref }}"
          REF_QUERY="${MANOMATIKA_REF:+?ref=${MANOMATIKA_REF}}"
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/manomatika/manomatika/contents/${RECIPE_PATH}${REF_QUERY}" > "$RECIPE_PATH"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install build dependencies
        run: pip install pyinstaller requests

      - name: Read recipe metadata
        id: recipe_info
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          app = r["application"]
          # PRODUCT identity drives every user-facing artifact/bundle name. The
          # filename slug is the product name lower-cased + slugified (lowercase
          # artifact-filename convention); the proper-noun product_name is used
          # verbatim for the installed .app / .exe identity. The PRODUCT version
          # (application.version) — NOT matika's framework version — is embedded
          # in artifact names and the installed identity.
          product_name = app["product_name"]
          product_slug = re.sub(r"[^a-z0-9]+", "-", product_name.lower()).strip("-")
          product_ver  = app["version"]
          matika_repo  = r["matika"]["repo"]
          # The recipe pins matika by explicit tag (recipe.matika.tag), the
          # same way each applug is pinned by its own tag. Use it directly
          # rather than deriving "v{version}" so the recipe stays the single
          # source of truth for what gets checked out.
          matika_tag   = r["matika"]["tag"]
          if not matika_repo.startswith("http"):
              matika_repo = "https://" + matika_repo
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"product_name={product_name}\n")
              f.write(f"product_slug={product_slug}\n")
              f.write(f"product_version={product_ver}\n")
              f.write(f"matika_repo={matika_repo}\n")
              f.write(f"matika_tag={matika_tag}\n")
          print(f"Product  : {product_name} v{product_ver}")
          print(f"Slug     : {product_slug}")
          print(f"Matika   : {matika_tag}")
          print(f"Repo     : {matika_repo}")
          PYEOF

      - name: Configure git credentials for GitHub App token
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh auth setup-git

      - name: Clone Matika at declared version
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          MATIKA_REPO="${{ steps.recipe_info.outputs.matika_repo }}"
          MATIKA_TAG="${{ steps.recipe_info.outputs.matika_tag }}"
          echo "Cloning Matika $MATIKA_TAG from $MATIKA_REPO"
          git clone --depth 1 --branch "$MATIKA_TAG" "$MATIKA_REPO" build/matika

      - name: Clone AppLugs into build/matika/plugins/
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          for plug in r["applugs"]:
              repo = plug["repo"]
              if not repo.startswith("http"):
                  repo = "https://" + repo
              tag  = plug["tag"]
              name = plug["name"]
              dest = f"build/matika/plugins/{name}"
              print(f"Cloning {name} @ {tag} from {repo} -> {dest}")
              subprocess.run(
                  ["git", "clone", "--depth", "1", "--branch", tag, repo, dest],
                  check=True,
              )
          PYEOF

      - name: Resolve pinned commit SHAs (provenance for install-verify)
        id: shas
        shell: bash
        run: |
          # Tags are mutable; the install-verify side-clone must be rebuilt from
          # the EXACT commits frozen here, not by re-resolving the recipe tag.
          # Resolve matika's HEAD and every cloned applug's HEAD and emit them as
          # job outputs: matika_sha (string) + applug_shas (JSON object, generic
          # over the applug set, e.g. {"eyerate":"<sha>"}).
          MATIKA_SHA="$(git -C build/matika rev-parse HEAD)"
          echo "matika_sha=${MATIKA_SHA}" >> "$GITHUB_OUTPUT"
          python3 - <<'PYEOF' > applug_shas.json
          import json, os, subprocess
          shas = {}
          plugins_dir = os.path.join("build", "matika", "plugins")
          if os.path.isdir(plugins_dir):
              for name in sorted(os.listdir(plugins_dir)):
                  dest = os.path.join(plugins_dir, name)
                  if not os.path.isdir(dest):
                      continue
                  sha = subprocess.run(
                      ["git", "-C", dest, "rev-parse", "HEAD"],
                      check=True, capture_output=True, text=True,
                  ).stdout.strip()
                  shas[name] = sha
          print(json.dumps(shas))
          PYEOF
          APPLUG_SHAS="$(cat applug_shas.json)"
          echo "applug_shas=${APPLUG_SHAS}" >> "$GITHUB_OUTPUT"
          rm -f applug_shas.json
          echo "Resolved matika_sha=${MATIKA_SHA}"
          echo "Resolved applug_shas=${APPLUG_SHAS}"

      - name: Strip dev scaffolding from applug payloads
        shell: bash
        run: |
          echo "Stripping dev scaffolding from applug payloads (post-SHA-resolution)..."
          for plug_dir in build/matika/plugins/*/; do
            [ -d "$plug_dir" ] || continue
            name="$(basename "$plug_dir")"
            dropped=""
            for entry in .git .github .husky .gitattributes .gitignore node_modules tests; do
              target="${plug_dir}${entry}"
              if [ -e "$target" ] || [ -L "$target" ]; then
                rm -rf "$target"
                dropped="${dropped}${entry} "
              fi
            done
            if [ -n "$dropped" ]; then
              echo "INFO: stripped from ${name}: ${dropped}"
            else
              echo "INFO: ${name} had no scaffolding to strip"
            fi
          done
          # Verify: fail loud if any scaffolding leaked through
          leaked=""
          for plug_dir in build/matika/plugins/*/; do
            [ -d "$plug_dir" ] || continue
            name="$(basename "$plug_dir")"
            for entry in .git .github .husky .gitattributes .gitignore node_modules tests; do
              if [ -e "${plug_dir}${entry}" ]; then
                leaked="${leaked}${name}/${entry} "
              fi
            done
          done
          if [ -n "$leaked" ]; then
            echo "ERROR: scaffolding leaked into payload: ${leaked}"
            exit 1
          fi

      - name: Build frontend (npm)
        shell: bash
        working-directory: build/matika
        run: |
          npm install
          npm run build

      - name: Install Matika runtime dependencies (PyInstaller bundles only what is importable)
        shell: bash
        working-directory: build/matika
        run: |
          # ROOT CAUSE of the "No module named 'alembic'" boot failure: the
          # frozen app shipped NONE of matika's runtime deps because they were
          # never installed before PyInstaller froze the bundle. PyInstaller can
          # only collect packages importable in THIS environment, so alembic /
          # fastapi / uvicorn / sqlalchemy were silently omitted and the app
          # died at the first third-party import. Extract deps from pyproject.toml
          # and install them individually (NOT `pip install -e .`) to bypass the
          # requires-python>=3.14 gate — CI runs Python 3.11, but the individual
          # packages are all 3.11-compatible. tomllib is stdlib from Python 3.11+.
          python3 -c "import tomllib,subprocess,sys; d=tomllib.load(open('pyproject.toml','rb')); subprocess.run([sys.executable,'-m','pip','install']+d['project']['dependencies'],check=True)"

      - name: Install AppLug runtime dependencies
        shell: bash
        working-directory: build/matika
        run: |
          # Install each cloned AppLug's runtime requirements before PyInstaller
          # so data-provider deps (e.g. yfinance, curl_cffi for eyerate) are
          # importable and collected by collect_all() in matika.spec. Without
          # this step, eyerate's symbol lookup/search silently returns empty
          # in the frozen app because curl_cffi/yfinance are not bundled.
          # Prefer pyproject.toml; fall back to requirements.txt for older
          # pinned applug tags that pre-date pyproject.toml adoption.
          for plug_dir in plugins/*/; do
            if [ -f "${plug_dir}pyproject.toml" ]; then
              PLUG_PY="${plug_dir}pyproject.toml" python3 -c "import tomllib,subprocess,sys,os; d=tomllib.load(open(os.environ['PLUG_PY'],'rb')); deps=d.get('project',{}).get('dependencies',[]); subprocess.run([sys.executable,'-m','pip','install']+deps,check=True) if deps else None"
            elif [ -f "${plug_dir}requirements.txt" ]; then
              pip install -r "${plug_dir}requirements.txt"
            fi
          done

      - name: Run PyInstaller (freeze the product bundle)
        shell: bash
        working-directory: build/matika
        env:
          # Drive the frozen artifact's identity from the recipe's product
          # fields so the bundle is <product_name>-<product_version> (e.g.
          # ManoMatika-0.0.1), not the matika component name/version.
          # matika.spec defaults to "Matika" + its own VERSION only for
          # standalone dev builds where neither env var is set.
          MATIKA_PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          MATIKA_PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # CORE/SUFFIX + PRODUCT-IDENTITY CONTRACT (cross-repo with
          # manomatika/matika): matika.spec reads MATIKA_PRODUCT_NAME and
          # MATIKA_PRODUCT_VERSION (set above from the recipe's product fields),
          # strips any pre-release suffix (-dev / -rc.N) to BARE CORE, and emits
          # the dist/<product_name>-<core>/ COLLECT tree containing
          # <product_name>-<core>.exe (e.g. ManoMatika-0.0.1.exe). So the
          # BUNDLE_DIR derived from PRODUCT_NAME + PRODUCT_VERSION below matches
          # the spec's name even when building at an rc TAG (e.g. v0.0.4-rc.1).
          # Plugins cloned into plugins/ are bundled by launcher.py at first
          # run, not by the spec. Run from the cloned matika root so the spec's
          # SPEC-relative paths (src/, launcher.py, VERSION) resolve.
          pyinstaller matika.spec --noconfirm
          echo "PyInstaller output:"
          ls -la dist

      - name: Assert PyInstaller bundle matches product identity
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          BUNDLE="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}"
          if [ ! -d "$BUNDLE" ]; then
            echo "::error::PyInstaller produced wrong bundle name."
            echo "Expected dir : $BUNDLE"
            echo "Found in build/matika/dist/:"
            ls -la build/matika/dist/ || true
            echo "Ensure recipe matika.tag >= v0.0.4-rc.3 (includes spec product-identity fix)."
            exit 1
          fi
          echo "OK: ${PRODUCT_NAME}-${PRODUCT_VERSION} dir exists"

      - name: Smoke-launch the frozen app (boot, migrate, load applug, serve)
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # DURABLE GUARDRAIL: boot the frozen one-dir .exe in a clean
          # USERPROFILE/HOME and fail the build if it can't start, run the
          # first-run alembic migration, load the eyerate applug, and bind its
          # server. The script dumps the app logs on failure; a hung boot fails
          # via the timeout.
          EXE="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}/${PRODUCT_NAME}-${PRODUCT_VERSION}.exe"
          python scripts/smoke_launch.py --exe "$EXE" --expect-plugin eyerate --timeout 90

      - name: Install verification dependencies (requests + Playwright Chromium)
        shell: bash
        run: |
          python -m pip install --upgrade requests playwright
          python -m playwright install chromium

      - name: Verify product FEATURES — fresh + upgrade-over-stale (tier a HTTP + tier b browser)
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # Same feature-level proof as the macOS jobs (standing rule 22): prove
          # EyeRate WORKS against the frozen .exe on BOTH the fresh and the
          # upgrade-over-stale install paths — admin provider form present, VOO
          # lookup returns real results, forced provider failure surfaces a visible
          # error, stale plugin refreshed + user data preserved. Tier (a) HTTP +
          # tier (b) headless Chromium.
          EXE="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}/${PRODUCT_NAME}-${PRODUCT_VERSION}.exe"
          # --source-root build/matika points the harness at the PINNED SOURCE
          # CLONES (matika core + plugins/*) so the tier-a/tier-b checks are
          # MANIFEST-DRIVEN: they discover and drive every declared screen from
          # the assembled *_screens.json (manomatika/ahimsa#82, A1 source-clone
          # arm) rather than hardcoding routes/markers.
          # --functional explicitly enables the Layer-3 applug-functional-test
          # phase (reboot-per-applug); it is also implied by --source-root, but
          # we pass it explicitly so the gate's intent is unambiguous in the job.
          python scripts/frozen_verify.py --exe "$EXE" --source-root build/matika --functional --scenario fresh   --browser --timeout 120
          python scripts/frozen_verify.py --exe "$EXE" --source-root build/matika --functional --scenario upgrade --browser --timeout 120

      - name: Build Windows installer (Inno Setup)
        shell: cmd
        env:
          PRODUCT_SLUG: ${{ steps.recipe_info.outputs.product_slug }}
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          @echo off
          REM Inno Setup is preinstalled on the windows-latest runner image (ISCC
          REM on PATH). It packages PyInstaller's one-dir output:
          REM   build\matika\dist\<product_name>-<product_version>\  (whole tree)
          REM into a single installer EXE. All values are passed in as /D defines
          REM so the .iss script carries no hardcoded name/version/path — the
          REM installed identity (AppName, exe, shortcuts) is the PRODUCT name and
          REM the source bundle is named after the product, per the recipe.
          set "BUNDLE_DIR=%CD%\build\matika\dist\%PRODUCT_NAME%-%PRODUCT_VERSION%"
          set "OUTPUT_BASENAME=%PRODUCT_SLUG%-%PRODUCT_VERSION%-windows-x86_64"
          if not exist "%BUNDLE_DIR%" (
            echo ::error::Expected PyInstaller bundle dir not found: %BUNDLE_DIR%
            dir build\matika\dist
            exit /b 1
          )
          ISCC ^
            /DMyAppName="%PRODUCT_NAME%" ^
            /DMyAppVersion="%PRODUCT_VERSION%" ^
            /DMyBundleDir="%BUNDLE_DIR%" ^
            /DMyOutputDir="%CD%" ^
            /DMyOutputBaseName="%OUTPUT_BASENAME%" ^
            installer\windows_installer.iss
          if errorlevel 1 exit /b 1
          dir "%OUTPUT_BASENAME%.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-windows-x86_64.exe
          path: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-windows-x86_64.exe

  # ---------------------------------------------------------------------------
  # INSTALL-VERIFY — macOS Apple Silicon (macos-14)
  # Downloads the DMG produced by build-macos-arm, mounts it, and re-runs
  # smoke_launch + frozen_verify against the INSTALLED application path — both
  # the fresh-install and upgrade-over-stale scenarios.
  # ---------------------------------------------------------------------------
  install-verify-macos-arm:
    runs-on: macos-14
    needs: build-macos-arm
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Fetch recipe from manomatika/manomatika
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p "$(dirname "$RECIPE_PATH")"
          MANOMATIKA_REF="${{ inputs.manomatika_ref }}"
          REF_QUERY="${MANOMATIKA_REF:+?ref=${MANOMATIKA_REF}}"
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/manomatika/manomatika/contents/${RECIPE_PATH}${REF_QUERY}" > "$RECIPE_PATH"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install verification dependencies (requests + Playwright Chromium)
        shell: bash
        run: |
          python -m pip install --upgrade requests playwright
          python -m playwright install chromium

      - name: Read recipe metadata
        id: recipe_info
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          app = r["application"]
          product_name = app["product_name"]
          product_slug = re.sub(r"[^a-z0-9]+", "-", product_name.lower()).strip("-")
          product_ver  = app["version"]
          # Surface the recipe's matika repo URL only — the COMMIT to check out
          # comes from the matching build job's resolved SHA output (provenance-
          # pinned), NOT from re-resolving the mutable recipe tag. The INSTALLED
          # artifact stays under test (--exe); manifest/test discovery comes from
          # the SHA-pinned source side-clone (Option-3 source-root fork).
          matika_repo  = r["matika"]["repo"]
          if not matika_repo.startswith("http"):
              matika_repo = "https://" + matika_repo
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"product_name={product_name}\n")
              f.write(f"product_slug={product_slug}\n")
              f.write(f"product_version={product_ver}\n")
              f.write(f"matika_repo={matika_repo}\n")
          print(f"Product  : {product_name} v{product_ver}")
          print(f"Slug     : {product_slug}")
          print(f"Matika repo : {matika_repo}")
          PYEOF

      - name: Configure git credentials for GitHub App token
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh auth setup-git

      - name: Checkout matika at the build job's resolved SHA (provenance-pinned)
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          MATIKA_SHA: ${{ needs.build-macos-arm.outputs.matika_sha }}
        run: |
          # PROVENANCE: tags are mutable, so the discovery side-clone is pinned
          # to the EXACT commit the build job froze
          # (needs.build-macos-arm.outputs.matika_sha), NOT re-resolved from the
          # recipe tag. Fetch-by-SHA (GitHub allows it): init an empty repo, add
          # the recipe's matika remote, fetch the one commit, check it out. The L3
          # functional-test .py is read ONLY from this clone — never bundled.
          MATIKA_REPO="${{ steps.recipe_info.outputs.matika_repo }}"
          echo "Fetching matika @ ${MATIKA_SHA} from ${MATIKA_REPO}"
          git init build/matika
          git -C build/matika remote add origin "${MATIKA_REPO}"
          git -C build/matika fetch --depth 1 origin "${MATIKA_SHA}"
          git -C build/matika checkout FETCH_HEAD

      - name: Checkout applugs at the build job's resolved SHAs (provenance-pinned)
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APPLUG_SHAS: ${{ needs.build-macos-arm.outputs.applug_shas }}
        run: |
          # The applug repo URL + name still come from the recipe; the COMMIT
          # comes from the build job's emitted applug_shas JSON, keyed by applug
          # name — so the side-clone is byte-identical to what was frozen.
          python3 - <<'PYEOF'
          import json, os, shutil, subprocess
          path = os.environ["RECIPE_PATH"]
          shas = json.loads(os.environ["APPLUG_SHAS"])
          with open(path) as f:
              r = json.load(f)
          for plug in r["applugs"]:
              repo = plug["repo"]
              if not repo.startswith("http"):
                  repo = "https://" + repo
              name = plug["name"]
              sha  = shas[name]
              dest = f"build/matika/plugins/{name}"
              print(f"Fetching {name} @ {sha} from {repo} -> {dest}")
              subprocess.run(["git", "init", dest], check=True)
              subprocess.run(["git", "-C", dest, "remote", "add", "origin", repo], check=True)
              subprocess.run(["git", "-C", dest, "fetch", "--depth", "1", "origin", sha], check=True)
              subprocess.run(["git", "-C", dest, "checkout", "FETCH_HEAD"], check=True)
              dropped = []
              for entry in ['.git', '.github', '.husky', '.gitattributes', '.gitignore', 'node_modules', 'tests']:
                  path = os.path.join(dest, entry)
                  if os.path.isdir(path):
                      shutil.rmtree(path, onerror=lambda f, p, e: (os.chmod(p, 0o777), f(p)))
                      dropped.append(entry)
                  elif os.path.isfile(path):
                      os.remove(path)
                      dropped.append(entry)
              print(f"INFO: exported {name} @ {sha} -> {dest} (filtered: {' '.join(dropped) if dropped else 'none'})")
          PYEOF

      - name: Download DMG artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-macos-arm64.dmg

      - name: Mount DMG and verify installed application
        shell: bash
        env:
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
          PRODUCT_SLUG: ${{ steps.recipe_info.outputs.product_slug }}
        run: |
          # The DMG filename uses the lowercase slug convention.
          DMG_NAME="${PRODUCT_SLUG}-${PRODUCT_VERSION}-macos-arm64.dmg"
          MOUNTPOINT="/Volumes/ManoMatikaDMG-arm"
          # Mount the DMG at a fixed mountpoint so the exe path is deterministic.
          hdiutil attach "${DMG_NAME}" -mountpoint "${MOUNTPOINT}" -nobrowse -quiet
          trap 'hdiutil detach "${MOUNTPOINT}" -quiet || true' EXIT
          # The installed .app has the same product-identity name as the bundle
          # produced by matika.spec (e.g. ManoMatika-0.0.1.app).
          EXE="${MOUNTPOINT}/${PRODUCT_NAME}-${PRODUCT_VERSION}.app/Contents/MacOS/${PRODUCT_NAME}-${PRODUCT_VERSION}"
          echo "Installed exe: ${EXE}"
          if [ ! -f "${EXE}" ]; then
            echo "::error::installed exe not found at ${EXE}"
            ls -la "${MOUNTPOINT}/" || true
            exit 1
          fi
          # Smoke-launch the installed application (proves the DMG ships a
          # launchable bundle, not just the freeze-dir artifact).
          python scripts/smoke_launch.py --exe "${EXE}" --expect-plugin eyerate --timeout 90
          # Feature-level checks against the INSTALLED exe on both install paths
          # (standing rule 22 — installer-level gap, manomatika/ahimsa#81).
          # The --exe flag is the "equivalent" path override described in #81 §5:
          # the same script serves both freeze-dir and installed-dir runs by
          # passing a different --exe value.
          # Option-3 source-root fork (L3 gate integration): --source-root points
          # the harness at the side-cloned PINNED sources (build/matika core +
          # plugins/*) so the manifest-driven L2 (tier-a/b) checks AND the L3
          # applug-functional-test phase run against the INSTALLED artifact under
          # --exe, with screen/test DISCOVERY from the pinned clone (tag-pinned,
          # matching the build job). --functional explicitly enables the Layer-3
          # reboot-per-applug phase. The installed-disk manifest arm (A2,
          # manomatika/ahimsa#83) and the route-vs-manifest gate (A3, #84) remain
          # distinct follow-on items — they are not this wiring.
          python scripts/frozen_verify.py --exe "${EXE}" --source-root build/matika --functional --scenario fresh   --browser --timeout 120
          python scripts/frozen_verify.py --exe "${EXE}" --source-root build/matika --functional --scenario upgrade --browser --timeout 120

