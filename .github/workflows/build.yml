name: Build and Release

on:
  workflow_dispatch:
    inputs:
      recipe_path:
        description: "Path to recipe.json (e.g. recipes/reference-app/recipe.json)"
        required: false
        default: "recipes/reference-app/recipe.json"
  push:
    tags:
      - "v*"

# ---------------------------------------------------------------------------
# VALIDATE
# ---------------------------------------------------------------------------
jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ahimsa
        run: pip install -e .

      - name: Validate recipe (fail fast)
        run: ahimsa-validate "$RECIPE_PATH"

  # ---------------------------------------------------------------------------
  # BUILD — macOS Apple Silicon (macos-14)
  # ---------------------------------------------------------------------------
  build-macos-arm:
    runs-on: macos-14
    needs: validate
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install build dependencies
        run: pip install pyinstaller dmgbuild requests

      - name: Read recipe metadata
        id: recipe_info
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          name        = r["application"]["name"]
          slug        = re.sub(r"[^a-z0-9]+", "-", name.lower()).strip("-")
          version     = r["application"]["version"]
          matika_v    = r["matika"]["version"]
          matika_repo = r["matika"]["repo"]
          # The recipe pins matika by explicit tag (recipe.matika.tag), the
          # same way each applug is pinned by its own tag. Use it directly
          # rather than deriving "v{version}" so the recipe stays the single
          # source of truth for what gets checked out.
          matika_tag  = r["matika"]["tag"]
          if not matika_repo.startswith("http"):
              matika_repo = "https://" + matika_repo
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"app_name={name}\n")
              f.write(f"app_slug={slug}\n")
              f.write(f"app_version={version}\n")
              f.write(f"matika_version={matika_v}\n")
              f.write(f"matika_repo={matika_repo}\n")
              f.write(f"matika_tag={matika_tag}\n")
          print(f"App      : {name} v{version}")
          print(f"Slug     : {slug}")
          print(f"Matika   : {matika_v} ({matika_tag})")
          print(f"Repo     : {matika_repo}")
          PYEOF

      - name: Clone Matika at declared version
        shell: bash
        run: |
          MATIKA_REPO="${{ steps.recipe_info.outputs.matika_repo }}"
          MATIKA_TAG="${{ steps.recipe_info.outputs.matika_tag }}"
          echo "Cloning Matika $MATIKA_TAG from $MATIKA_REPO"
          git clone --depth 1 --branch "$MATIKA_TAG" "$MATIKA_REPO" build/matika

      - name: Clone AppLugs into build/matika/plugins/
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          for plug in r["applugs"]:
              repo = plug["repo"]
              if not repo.startswith("http"):
                  repo = "https://" + repo
              tag  = plug["tag"]
              name = plug["name"]
              dest = f"build/matika/plugins/{name}"
              print(f"Cloning {name} @ {tag} from {repo} -> {dest}")
              subprocess.run(
                  ["git", "clone", "--depth", "1", "--branch", tag, repo, dest],
                  check=True,
              )
          PYEOF

      - name: Build frontend (npm)
        shell: bash
        working-directory: build/matika
        run: |
          npm install
          npm run build

      - name: Run PyInstaller (freeze Matika.app)
        shell: bash
        working-directory: build/matika
        run: |
          # matika.spec reads its own VERSION file and emits
          # dist/Matika-<version>.app plus the dist/Matika-<version>/ COLLECT
          # tree. Plugins cloned into plugins/ are bundled by launcher.py at
          # first run, not by the spec. Run from the cloned matika root so the
          # spec's SPEC-relative paths (src/, launcher.py, VERSION) resolve.
          pyinstaller matika.spec --noconfirm
          echo "PyInstaller output:"
          ls -la dist

      - name: Build DMG (dmgbuild)
        shell: bash
        env:
          APP_SLUG: ${{ steps.recipe_info.outputs.app_slug }}
          APP_NAME: ${{ steps.recipe_info.outputs.app_name }}
          APP_VERSION: ${{ steps.recipe_info.outputs.app_version }}
          MATIKA_VERSION: ${{ steps.recipe_info.outputs.matika_version }}
          DMG_ARCH: arm64
        run: |
          # Wrap the PyInstaller .app bundle in a DMG via the dmgbuild library.
          # The .app is named Matika-<matika_version>.app by matika.spec; the
          # DMG filename follows ahimsa's convention <slug>-<app_version>-macos-<arch>.dmg.
          APP_BUNDLE="build/matika/dist/Matika-${MATIKA_VERSION}.app"
          DMG_NAME="${APP_SLUG}-${APP_VERSION}-macos-${DMG_ARCH}.dmg"
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "::error::Expected app bundle not found: $APP_BUNDLE"
            ls -la build/matika/dist || true
            exit 1
          fi
          python3 scripts/make_dmg.py \
            --app "$APP_BUNDLE" \
            --volname "${APP_NAME} ${APP_VERSION}" \
            --output "$DMG_NAME"
          echo "Built DMG:"
          ls -la "$DMG_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.recipe_info.outputs.app_slug }}-${{ steps.recipe_info.outputs.app_version }}-macos-arm64.dmg
          path: ${{ steps.recipe_info.outputs.app_slug }}-${{ steps.recipe_info.outputs.app_version }}-macos-arm64.dmg

  # ---------------------------------------------------------------------------
  # BUILD — macOS Intel (macos-13)
  # ---------------------------------------------------------------------------
  build-macos-intel:
    runs-on: macos-13
    needs: validate
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
