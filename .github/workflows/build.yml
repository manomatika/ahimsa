name: Build

on:
  workflow_dispatch:
    inputs:
      recipe_path:
        description: "Path to recipe.json (e.g. recipes/reference-app/recipe.json)"
        required: false
        default: "recipes/reference-app/recipe.json"

# ---------------------------------------------------------------------------
# VALIDATE
# ---------------------------------------------------------------------------
jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Fetch recipe from manomatika/manomatika
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p "$(dirname "$RECIPE_PATH")"
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/manomatika/manomatika/contents/$RECIPE_PATH" > "$RECIPE_PATH"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ahimsa
        run: pip install -e .

      - name: Validate recipe (fail fast)
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: ahimsa-validate "$RECIPE_PATH"

  # ---------------------------------------------------------------------------
  # BUILD — macOS Apple Silicon (macos-14)
  # ---------------------------------------------------------------------------
  build-macos-arm:
    runs-on: macos-14
    needs: validate
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Fetch recipe from manomatika/manomatika
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p "$(dirname "$RECIPE_PATH")"
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/manomatika/manomatika/contents/$RECIPE_PATH" > "$RECIPE_PATH"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install build dependencies
        run: pip install pyinstaller dmgbuild requests

      - name: Read recipe metadata
        id: recipe_info
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          app = r["application"]
          # PRODUCT identity drives every user-facing artifact/bundle name. The
          # filename slug is the product name lower-cased + slugified (lowercase
          # artifact-filename convention); the proper-noun product_name is used
          # verbatim for the installed .app / .exe identity. The PRODUCT version
          # (application.version) — NOT matika's framework version — is embedded
          # in artifact names and the installed identity.
          product_name = app["product_name"]
          product_slug = re.sub(r"[^a-z0-9]+", "-", product_name.lower()).strip("-")
          product_ver  = app["version"]
          matika_repo  = r["matika"]["repo"]
          # The recipe pins matika by explicit tag (recipe.matika.tag), the
          # same way each applug is pinned by its own tag. Use it directly
          # rather than deriving "v{version}" so the recipe stays the single
          # source of truth for what gets checked out.
          matika_tag   = r["matika"]["tag"]
          if not matika_repo.startswith("http"):
              matika_repo = "https://" + matika_repo
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"product_name={product_name}\n")
              f.write(f"product_slug={product_slug}\n")
              f.write(f"product_version={product_ver}\n")
              f.write(f"matika_repo={matika_repo}\n")
              f.write(f"matika_tag={matika_tag}\n")
          print(f"Product  : {product_name} v{product_ver}")
          print(f"Slug     : {product_slug}")
          print(f"Matika   : {matika_tag}")
          print(f"Repo     : {matika_repo}")
          PYEOF

      - name: Configure git credentials for GitHub App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh auth setup-git

      - name: Clone Matika at declared version
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          MATIKA_REPO="${{ steps.recipe_info.outputs.matika_repo }}"
          MATIKA_TAG="${{ steps.recipe_info.outputs.matika_tag }}"
          echo "Cloning Matika $MATIKA_TAG from $MATIKA_REPO"
          git clone --depth 1 --branch "$MATIKA_TAG" "$MATIKA_REPO" build/matika

      - name: Clone AppLugs into build/matika/plugins/
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          for plug in r["applugs"]:
              repo = plug["repo"]
              if not repo.startswith("http"):
                  repo = "https://" + repo
              tag  = plug["tag"]
              name = plug["name"]
              dest = f"build/matika/plugins/{name}"
              print(f"Cloning {name} @ {tag} from {repo} -> {dest}")
              subprocess.run(
                  ["git", "clone", "--depth", "1", "--branch", tag, repo, dest],
                  check=True,
              )
          PYEOF

      - name: Build frontend (npm)
        shell: bash
        working-directory: build/matika
        run: |
          npm install
          npm run build

      - name: Run PyInstaller (freeze the product bundle)
        shell: bash
        working-directory: build/matika
        env:
          # Drive the frozen artifact's identity from the recipe's product
          # fields so the bundle is <product_name>-<product_version> (e.g.
          # ManoMatika-0.0.1), not the matika component name/version.
          # matika.spec defaults to "Matika" + its own VERSION only for
          # standalone dev builds where neither env var is set.
          MATIKA_PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          MATIKA_PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
        run: |
          # CORE/SUFFIX + PRODUCT-IDENTITY CONTRACT (cross-repo with
          # manomatika/matika): matika.spec reads MATIKA_PRODUCT_NAME and
          # MATIKA_PRODUCT_VERSION (set above from the recipe's product fields),
          # strips any pre-release suffix (-dev / -rc.N) from the version to
          # BARE CORE, and emits dist/<product_name>-<core>.app plus the
          # dist/<product_name>-<core>/ COLLECT tree (e.g. ManoMatika-0.0.1).
          # So the bundle is named after the PRODUCT, not the matika component,
          # and the DMG/installer steps below locate it by the same product
          # name + product version even when the build runs at an rc TAG.
          # Plugins cloned into plugins/ are bundled by launcher.py at first run,
          # not by the spec. Run from the cloned matika root so the spec's
          # SPEC-relative paths (src/, launcher.py, VERSION) resolve.
          pyinstaller matika.spec --noconfirm
          echo "PyInstaller output:"
          ls -la dist

      - name: Build DMG (dmgbuild)
        shell: bash
        env:
          PRODUCT_SLUG: ${{ steps.recipe_info.outputs.product_slug }}
          PRODUCT_NAME: ${{ steps.recipe_info.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.recipe_info.outputs.product_version }}
          DMG_ARCH: arm64
        run: |
          # Wrap the PyInstaller .app bundle in a DMG via the dmgbuild library.
          # matika.spec emits <product_name>-<product-core>.app (suffix
          # stripped), driven by the MATIKA_PRODUCT_* env passed to the
          # PyInstaller step — so the installed bundle is named after the
          # PRODUCT (e.g. ManoMatika-0.0.1.app), not the matika component. The
          # DMG filename follows ahimsa's lowercase convention
          # <product_slug>-<product_version>-macos-<arch>.dmg.
          APP_BUNDLE="build/matika/dist/${PRODUCT_NAME}-${PRODUCT_VERSION}.app"
          DMG_NAME="${PRODUCT_SLUG}-${PRODUCT_VERSION}-macos-${DMG_ARCH}.dmg"
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "::error::Expected app bundle not found: $APP_BUNDLE"
            ls -la build/matika/dist || true
            exit 1
          fi
          python3 scripts/make_dmg.py \
            --app "$APP_BUNDLE" \
            --volname "${PRODUCT_NAME} ${PRODUCT_VERSION}" \
            --output "$DMG_NAME"
          echo "Built DMG:"
          ls -la "$DMG_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-macos-arm64.dmg
          path: ${{ steps.recipe_info.outputs.product_slug }}-${{ steps.recipe_info.outputs.product_version }}-macos-arm64.dmg

  # ---------------------------------------------------------------------------
  # BUILD — macOS Intel (macos-15-intel)
  # ---------------------------------------------------------------------------
  build-macos-intel:
    runs-on: macos-15-intel
    needs: validate
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

