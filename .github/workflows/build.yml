          path: ${{ steps.recipe_info.outputs.app_slug }}-${{ steps.recipe_info.outputs.app_version }}-macos-x86_64.dmg

  # ---------------------------------------------------------------------------
  # BUILD — Windows x86_64
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    needs: validate
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install build dependencies
        run: pip install pyinstaller requests

      - name: Read recipe metadata
        id: recipe_info
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          name        = r["application"]["name"]
          slug        = re.sub(r"[^a-z0-9]+", "-", name.lower()).strip("-")
          version     = r["application"]["version"]
          matika_v    = r["matika"]["version"]
          matika_repo = r["matika"]["repo"]
          # The recipe pins matika by explicit tag (recipe.matika.tag), the
          # same way each applug is pinned by its own tag. Use it directly
          # rather than deriving "v{version}" so the recipe stays the single
          # source of truth for what gets checked out.
          matika_tag  = r["matika"]["tag"]
          if not matika_repo.startswith("http"):
              matika_repo = "https://" + matika_repo
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"app_name={name}\n")
              f.write(f"app_slug={slug}\n")
              f.write(f"app_version={version}\n")
              f.write(f"matika_version={matika_v}\n")
              f.write(f"matika_repo={matika_repo}\n")
              f.write(f"matika_tag={matika_tag}\n")
          print(f"App      : {name} v{version}")
          print(f"Slug     : {slug}")
          print(f"Matika   : {matika_v} ({matika_tag})")
          print(f"Repo     : {matika_repo}")
          PYEOF

      - name: Clone Matika at declared version
        shell: bash
        run: |
          MATIKA_REPO="${{ steps.recipe_info.outputs.matika_repo }}"
          MATIKA_TAG="${{ steps.recipe_info.outputs.matika_tag }}"
          echo "Cloning Matika $MATIKA_TAG from $MATIKA_REPO"
          git clone --depth 1 --branch "$MATIKA_TAG" "$MATIKA_REPO" build/matika

      - name: Clone AppLugs into build/matika/plugins/
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          for plug in r["applugs"]:
              repo = plug["repo"]
              if not repo.startswith("http"):
                  repo = "https://" + repo
              tag  = plug["tag"]
              name = plug["name"]
              dest = f"build/matika/plugins/{name}"
              print(f"Cloning {name} @ {tag} from {repo} -> {dest}")
              subprocess.run(
                  ["git", "clone", "--depth", "1", "--branch", tag, repo, dest],
                  check=True,
              )
          PYEOF

      - name: Build frontend (npm)
        shell: bash
        working-directory: build/matika
        run: |
          npm install
          npm run build

      - name: Run PyInstaller (freeze Matika.exe)
        shell: bash
        working-directory: build/matika
        run: |
          # matika.spec reads its own VERSION file and emits the
          # dist/Matika-<version>/ COLLECT tree containing Matika-<version>.exe.
          # Plugins cloned into plugins/ are bundled by launcher.py at first
          # run, not by the spec. Run from the cloned matika root so the spec's
          # SPEC-relative paths (src/, launcher.py, VERSION) resolve.
          pyinstaller matika.spec --noconfirm
          echo "PyInstaller output:"
          ls -la dist

      - name: Build Windows installer (Inno Setup)
        shell: cmd
        env:
          APP_SLUG: ${{ steps.recipe_info.outputs.app_slug }}
          APP_NAME: ${{ steps.recipe_info.outputs.app_name }}
          APP_VERSION: ${{ steps.recipe_info.outputs.app_version }}
          MATIKA_VERSION: ${{ steps.recipe_info.outputs.matika_version }}
        run: |
          @echo off
          REM Inno Setup is preinstalled on the windows-latest runner image (ISCC
          REM on PATH). It packages PyInstaller's one-dir output:
          REM   build\matika\dist\Matika-<matika_version>\  (whole directory tree)
          REM into a single installer EXE. All values are passed in as /D defines
          REM so the .iss script carries no hardcoded version or path — AppVersion
          REM and the source bundle are dynamic per the recipe.
          set "BUNDLE_DIR=build\matika\dist\Matika-%MATIKA_VERSION%"
          set "OUTPUT_BASENAME=%APP_SLUG%-%APP_VERSION%-windows-x86_64"
          if not exist "%BUNDLE_DIR%" (
            echo ::error::Expected PyInstaller bundle dir not found: %BUNDLE_DIR%
            dir build\matika\dist
            exit /b 1
          )
          ISCC ^
            /DMyAppName="%APP_NAME%" ^
            /DMyAppVersion="%APP_VERSION%" ^
            /DMyMatikaVersion="%MATIKA_VERSION%" ^
            /DMyBundleDir="%BUNDLE_DIR%" ^
            /DMyOutputDir="." ^
            /DMyOutputBaseName="%OUTPUT_BASENAME%" ^
            installer\windows_installer.iss
          if errorlevel 1 exit /b 1
          dir "%OUTPUT_BASENAME%.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.recipe_info.outputs.app_slug }}-${{ steps.recipe_info.outputs.app_version }}-windows-x86_64.exe
          path: ${{ steps.recipe_info.outputs.app_slug }}-${{ steps.recipe_info.outputs.app_version }}-windows-x86_64.exe

  # ---------------------------------------------------------------------------
  # RELEASE — tag push only
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [build-macos-arm, build-macos-intel, build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    env:
      RECIPE_PATH: ${{ inputs.recipe_path || 'recipes/reference-app/recipe.json' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Read recipe metadata
        id: recipe_info
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          name    = r["application"]["name"]
          slug    = re.sub(r"[^a-z0-9]+", "-", name.lower()).strip("-")
          version = r["application"]["version"]
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"app_name={name}\n")
              f.write(f"app_slug={slug}\n")
              f.write(f"app_version={version}\n")
          PYEOF

      - name: Install ahimsa
        run: pip install -e .

      - name: Validate release log (fail on drift)
        run: ahimsa-validate-releases

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Generate release notes
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path
          path = os.environ["RECIPE_PATH"]
          with open(path) as f:
              r = json.load(f)
          name     = r["application"]["name"]
          version  = r["application"]["version"]
          matika_v = r["matika"]["version"]
          # Dynamic header lines (recipe-derived).
          lines = [
              f"## {name} v{version}",
              "",
              f"Built with [Matika](https://github.com/manomatika/matika) {matika_v}.",
              "",
              "**AppLugs included:**",
          ]
          for plug in r["applugs"]:
              lines.append(
                  f"- **{plug['name']}** v{plug['version']} "
                  f"(matika_version: {plug['matika_version']})"
              )
          # Per-tag release notes file (§8.4-A Q4 hybrid).
          # Derive the tag from the git ref: GITHUB_REF_NAME is set by Actions.
          tag = os.environ.get("GITHUB_REF_NAME", "")
          notes_file = Path(f"docs/release-notes/{tag}.md")
          if notes_file.exists():
              # Append the static per-release notes from the versioned file.
              static_text = notes_file.read_text()
              lines.append(static_text.rstrip("\n"))
          else:
              # Q3 fallback: no per-tag file found; emit a minimal body.
              lines += [
                  "",
                  f"## {name} v{version}",
                  "",
                  f"Built with Matika {matika_v}.",
                  "",
                  "No release notes file found for this tag.",
              ]
          with open("release_notes.md", "w") as f:
              f.write("\n".join(lines) + "\n")
          print("Release notes:")
          print("\n".join(lines))
          PYEOF

      - name: Create GitHub release
        shell: bash
        run: |
          APP_NAME="${{ steps.recipe_info.outputs.app_name }}"
          APP_VERSION="${{ steps.recipe_info.outputs.app_version }}"
          ARTIFACTS=$(find artifacts -type f | sort | tr '\n' ' ')

          gh release create "${{ github.ref_name }}" \
            --title "${APP_NAME} v${APP_VERSION}" \
            --notes-file release_notes.md \
            $ARTIFACTS

  # ---------------------------------------------------------------------------
  # REFRESH RELEASES.MD — workflow_dispatch only
  # Checks out manomatika/manomatika, renders RELEASES.md from its
  # release-log.yaml, and opens a PR to mm (not to ahimsa).
  # ---------------------------------------------------------------------------
  refresh-releases-md:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout ahimsa (render script + package)
        uses: actions/checkout@v6

      - name: Checkout manomatika/manomatika (release-log.yaml + RELEASES.md)
        uses: actions/checkout@v6
        with:
          repository: manomatika/manomatika
          path: mm
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install ahimsa
        run: pip install -e .

      - name: Render RELEASES.md
        env:
          RELEASE_LOG_PATH: mm/release-log.yaml
          RELEASES_MD_PATH: mm/RELEASES.md
        run: python scripts/render_releases_md.py

      - name: Open PR to manomatika/manomatika with updated RELEASES.md
        run: |
          cd mm
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/refresh-releases-md-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add RELEASES.md
          git commit -m "chore: refresh RELEASES.md from release-log.yaml" || echo "No changes"
          git push origin "$BRANCH"
          gh pr create \
            --repo manomatika/manomatika \
            --title "chore: refresh RELEASES.md" \
            --body "Auto-generated by ahimsa workflow_dispatch refresh. Review and merge to update the central release log." \
            --base main \
            --head "$BRANCH"
