name: Validate Recipes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Check matika out alongside ahimsa so the cross-repo schema-parity test
      # (tests/test_screen_schema_parity.py, relocated here per
      # manomatika/matika#105) can read matika's CANONICAL schema constants and
      # assert ahimsa's MIRROR matches. matika is public, so no token is needed.
      # MATIKA_SRC (set on the pytest step below) points the test at this clone.
      - name: Checkout matika source (cross-repo parity)
        uses: actions/checkout@v6
        with:
          repository: manomatika/matika
          path: matika-src

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: read

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install ahimsa and test dependencies via uv
        run: uv sync --frozen

      # Runs the COMPLETE suite — unit, invocation, AND the real-network
      # integration tier (no deselection). GITHUB_TOKEN is the auto-provisioned
      # workflow token; the resolver reads it (GITHUB_TOKEN → GH_TOKEN) to lift
      # the integration tier's GitHub rate limit on shared CI runners. The tier
      # only touches public repos, so the token is for headroom, not access.
      - name: Run full test suite (unit + invocation + integration)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point the relocated cross-repo parity test at the matika checkout.
          MATIKA_SRC: ${{ github.workspace }}/matika-src
        run: uv run pytest tests/

      - name: Fetch reference recipe from manomatika/manomatika
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p recipes/reference-app
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/manomatika/manomatika/contents/recipes/reference-app/recipe.json" \
            > recipes/reference-app/recipe.json

      - name: Validate recipes
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          for recipe in recipes/*/recipe.json; do
            uv run ahimsa-validate "$recipe"
          done
