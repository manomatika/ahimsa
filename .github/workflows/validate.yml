name: Validate Recipes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ahimsa and test dependencies
        run: pip install -e ".[test]"

      # Runs the COMPLETE suite — unit, invocation, AND the real-network
      # integration tier (no deselection). GITHUB_TOKEN is the auto-provisioned
      # workflow token; the resolver reads it (GITHUB_TOKEN → GH_TOKEN) to lift
      # the integration tier's GitHub rate limit on shared CI runners. The tier
      # only touches public repos, so the token is for headroom, not access.
      - name: Run full test suite (unit + invocation + integration)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pytest tests/

      - name: Fetch reference recipe from manomatika/manomatika
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p recipes/reference-app
          gh api -H "Accept: application/vnd.github.raw+json" \
            "repos/manomatika/manomatika/contents/recipes/reference-app/recipe.json" \
            > recipes/reference-app/recipe.json

      - name: Validate recipes
        run: |
          for recipe in recipes/*/recipe.json; do
            ahimsa-validate "$recipe"
          done
