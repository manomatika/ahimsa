name: Validate Recipes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ahimsa and test dependencies
        run: pip install -e ".[test]"

      # Runs the COMPLETE suite — unit, invocation, AND the real-network
      # integration tier (no deselection). GITHUB_TOKEN is the auto-provisioned
      # workflow token; the resolver reads it (GITHUB_TOKEN → GH_TOKEN) to lift
      # the integration tier's GitHub rate limit on shared CI runners. The tier
      # only touches public repos, so the token is for headroom, not access.
      - name: Run full test suite (unit + invocation + integration)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pytest tests/

      # TODO(manomatika/ahimsa#60): re-enable after manomatika/matika and
      # manomatika/eyerate publish their v0.0.4 (or v0.0.4-rc.N) tags. The live
      # remote-fetch step always fails until those tags exist; unit tests cover
      # all validator logic via mocks. The validator accepts pre-release TAGS
      # (e.g. v0.0.4-rc.1) — only the bare-core version PINS are format-checked —
      # so this step can be re-enabled at rc time, not only at final. Re-enable
      # as a one-line uncomment.
      # - name: Validate recipes
      #   run: |
      #     for recipe in recipes/*/recipe.json; do
      #       ahimsa-validate "$recipe"
      #     done
