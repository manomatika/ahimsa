name: Validate Recipes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Validate all recipes and print summary
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import subprocess, sys
          from pathlib import Path

          recipes = sorted(Path("recipes").rglob("recipe.json"))

          if not recipes:
              print("No recipe.json files found under recipes/")
              sys.exit(0)

          passed = []
          failed = []

          for recipe in recipes:
              print(f"\n{'=' * 60}")
              print(f"Validating: {recipe}")
              print('=' * 60)
              result = subprocess.run(
                  ["python3", "scripts/validate_recipe.py", str(recipe)]
              )
              if result.returncode == 0:
                  passed.append(str(recipe))
              else:
                  failed.append(str(recipe))

          print()
          print("=" * 60)
          print(f"SUMMARY  {len(passed)} passed, {len(failed)} failed")
          print("=" * 60)
          for r in passed:
              print(f"  PASS  {r}")
          for r in failed:
              print(f"  FAIL  {r}")
          print("=" * 60)

          if failed:
              sys.exit(1)
          PYEOF
