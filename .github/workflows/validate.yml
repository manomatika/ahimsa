name: Validate Recipes

on:
  push:
    paths:
      - "recipes/**"
  pull_request:
    paths:
      - "recipes/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Validate all recipes
        run: |
          find recipes -name "recipe.json" | while read f; do
            python scripts/validate_recipe.py "$f"
          done
