name: Validate Recipes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ahimsa and test dependencies
        run: pip install -e ".[test]"

      - name: Run unit and invocation tests
        run: pytest tests/

      # TODO: re-enable after matika v0.0.4 and eyerate v0.0.4 are tagged.
      # The live remote-fetch step always fails until those tags exist; unit tests
      # cover all validator logic via mocks. Re-enable as a one-line uncomment
      # once both upstream repos have published their v0.0.4 release tags.
